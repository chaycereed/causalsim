# ------------------------------------------------------------------
# Basic metadata
# ------------------------------------------------------------------
package: causalsim
title: "causalsim"
subtitle: "Causal estimator benchmarking under known ground truth"
url: https://chaycereed.github.io/causalsim

# ------------------------------------------------------------------
# Template / theme
# ------------------------------------------------------------------
template:
  bootstrap: 5
  bootswatch: flatly
  params:
    ganalytics: false

# ------------------------------------------------------------------
# Home page behavior
# ------------------------------------------------------------------
home:
  title: "causalsim"
  description: >
    An R package for defining causal data generating processes with known
    ground truth and evaluating estimator performance against them.
  links:
    - text: GitHub repository
      href: https://github.com/chaycereed/causalsim

# ------------------------------------------------------------------
# Navbar configuration
# ------------------------------------------------------------------
navbar:
  structure:
    left:  [home, reference, articles]
    right: [github]

  components:
    home:
      text: "Home"
      href: index.html

    reference:
      text: "Reference"
      href: reference/index.html

    articles:
      text: "Vignette"
      menu:
        - text: "A Complete Simulation Study"
          href: articles/simulation-study.html

    github:
      icon: fab fa-github
      href: https://github.com/chaycereed/causalsim

# ------------------------------------------------------------------
# Reference organization
# ------------------------------------------------------------------
reference:
  - title: "Core functions"
    contents:
      - causalsim_dgp
      - covar
      - causalsim_draw
      - causalsim_eval
      - summary.causalsim_eval
      - plot.causalsim_eval
      - causalsim_grid

# ------------------------------------------------------------------
# Footer
# ------------------------------------------------------------------
footer:
  text: >
    causalsim is an independent open-source project and is not affiliated
    with any institution or funding body.

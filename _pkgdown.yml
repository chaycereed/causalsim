package: causalsim
title: "causalsim"
subtitle: "Causal estimator benchmarking under known ground truth"
url: https://chaycereed.github.io/causalsim

template:
  bootstrap: 5
  bootswatch: flatly
  params:
    ganalytics: false

home:
  title: "causalsim"
  description: >
    An R package for defining causal data generating processes with known
    ground truth and evaluating estimator performance against them.
  links:
    - text: GitHub repository
      href: https://github.com/chaycereed/causalsim

navbar:
  structure:
    left:  [home, reference, articles]
    right: [github]
  components:
    home:
      text: "Home"
      href: index.html
    reference:
      text: "Reference"
      href: reference/index.html
    articles:
      text: "Vignette"
      menu:
        - text: "A Complete Simulation Study"
          href: articles/simulation-study.html
    github:
      icon: fab fa-github
      href: https://github.com/chaycereed/causalsim

reference:
  - title: "Data Generating Processes"
    desc: "Define and draw from causal DGPs with known ground truth."
    contents:
      - causalsim_dgp
      - covar
      - causalsim_draw
  - title: "Evaluation"
    desc: "Measure estimator performance against the known ground truth."
    contents:
      - causalsim_eval
      - summary.causalsim_eval
      - plot.causalsim_eval
      - causalsim_grid

footer:
  text: >
    causalsim is an independent open-source project and is not affiliated with
    any institution or funding body.
